<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站管理 - PremioPack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="admin-layout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="logo-icon"><i class="fas fa-box-open"></i></span>
            <span class="logo-text">Premio<span class="accent">Pack</span></span>
            <span class="admin-badge">管理</span>
        </div>
        <nav class="sidebar-nav">
            <a href="#general" class="nav-item active" data-section="general">
                <i class="fas fa-cog"></i> 基本设置
            </a>
            <a href="#hero" class="nav-item" data-section="hero">
                <i class="fas fa-images"></i> 轮播图
            </a>
            <a href="#about" class="nav-item" data-section="about">
                <i class="fas fa-info-circle"></i> 关于我们
            </a>
            <a href="#services" class="nav-item" data-section="services">
                <i class="fas fa-concierge-bell"></i> 服务项目
            </a>
            <a href="#products" class="nav-item" data-section="products">
                <i class="fas fa-box"></i> 产品展示
            </a>
            <a href="#faq" class="nav-item" data-section="faq">
                <i class="fas fa-question-circle"></i> 常见问题
            </a>
            <a href="#contact" class="nav-item" data-section="contact">
                <i class="fas fa-address-card"></i> 联系我们
            </a>
            <a href="#footer" class="nav-item" data-section="footer">
                <i class="fas fa-shoe-prints"></i> 页脚信息
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="../index.html" target="_blank" class="view-site-btn">
                <i class="fas fa-external-link-alt"></i> 查看网站
            </a>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
        <header class="top-header">
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <h1>网站内容管理</h1>
            <div class="header-actions">
                <button class="btn btn-outline" id="resetBtn"><i class="fas fa-undo"></i> 重置</button>
                <button class="btn btn-primary" id="saveBtn"><i class="fas fa-save"></i> 保存全部</button>
            </div>
        </header>

        <div class="content-area">
            <!-- 提示 -->
            <div class="toast" id="toast">
                <i class="fas fa-check-circle"></i>
                <span id="toastMsg">保存成功！</span>
            </div>

            <!-- 基本设置 -->
            <section class="panel active" id="panel-general">
                <h2><i class="fas fa-cog"></i> 基本设置</h2>
                <div class="form-card">
                    <div class="form-row">
                        <div class="form-group">
                            <label>公司名称</label>
                            <input type="text" id="companyName" placeholder="PremioPack">
                        </div>
                        <div class="form-group">
                            <label>公司标语</label>
                            <input type="text" id="companyTagline" placeholder="Premium Packaging Solutions">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>电话</label>
                            <input type="text" id="globalPhone" placeholder="+971 50 123 4567">
                        </div>
                        <div class="form-group">
                            <label>邮箱</label>
                            <input type="email" id="globalEmail" placeholder="info@premiumpack.ae">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>地址</label>
                        <input type="text" id="globalAddress" placeholder="Dubai, United Arab Emirates">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Facebook 链接</label>
                            <input type="text" id="socialFacebook" placeholder="https://facebook.com/...">
                        </div>
                        <div class="form-group">
                            <label>Instagram 链接</label>
                            <input type="text" id="socialInstagram" placeholder="https://instagram.com/...">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>LinkedIn 链接</label>
                            <input type="text" id="socialLinkedin" placeholder="https://linkedin.com/...">
                        </div>
                        <div class="form-group">
                            <label>WhatsApp 号码</label>
                            <input type="text" id="socialWhatsapp" placeholder="+971501234567">
                        </div>
                    </div>
                </div>
            </section>

            <!-- 轮播图 -->
            <section class="panel" id="panel-hero">
                <h2><i class="fas fa-images"></i> 轮播图管理</h2>
                <div id="heroSlides"></div>
                <button class="btn btn-add" id="addSlide"><i class="fas fa-plus"></i> 添加轮播图</button>
            </section>

            <!-- 关于我们 -->
            <section class="panel" id="panel-about">
                <h2><i class="fas fa-info-circle"></i> 关于我们</h2>
                <div class="form-card">
                    <div class="form-group">
                        <label>板块标题</label>
                        <input type="text" id="aboutTitle">
                    </div>
                    <div class="form-group">
                        <label>描述文字 1</label>
                        <textarea id="aboutText1" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label>描述文字 2</label>
                        <textarea id="aboutText2" rows="4"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>经验徽章数字</label>
                            <input type="text" id="aboutExpNumber" placeholder="7+">
                        </div>
                        <div class="form-group">
                            <label>经验徽章文字</label>
                            <input type="text" id="aboutExpText" placeholder="Years of Excellence">
                        </div>
                    </div>
                </div>
                <h3>特色亮点</h3>
                <div id="aboutFeatures"></div>
                <button class="btn btn-add" id="addFeature"><i class="fas fa-plus"></i> 添加特色</button>
            </section>

            <!-- 服务项目 -->
            <section class="panel" id="panel-services">
                <h2><i class="fas fa-concierge-bell"></i> 服务项目</h2>
                <div id="servicesList"></div>
                <button class="btn btn-add" id="addService"><i class="fas fa-plus"></i> 添加服务</button>
            </section>

            <!-- 产品展示 -->
            <section class="panel" id="panel-products">
                <h2><i class="fas fa-box"></i> 产品展示</h2>
                <div id="productsList"></div>
                <button class="btn btn-add" id="addProduct"><i class="fas fa-plus"></i> 添加产品</button>
            </section>

            <!-- 常见问题 -->
            <section class="panel" id="panel-faq">
                <h2><i class="fas fa-question-circle"></i> 常见问题 (FAQ)</h2>
                <div id="faqList"></div>
                <button class="btn btn-add" id="addFaq"><i class="fas fa-plus"></i> 添加问题</button>
            </section>

            <!-- 联系我们 -->
            <section class="panel" id="panel-contact">
                <h2><i class="fas fa-address-card"></i> 联系我们</h2>
                <div class="form-card">
                    <div class="form-group">
                        <label>板块标题</label>
                        <input type="text" id="contactTitle">
                    </div>
                    <div class="form-group">
                        <label>描述文字</label>
                        <textarea id="contactDesc" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>工作时间</label>
                        <input type="text" id="contactHours" placeholder="周日 - 周四: 9:00 AM - 6:00 PM">
                    </div>
                </div>
            </section>

            <!-- 页脚信息 -->
            <section class="panel" id="panel-footer">
                <h2><i class="fas fa-shoe-prints"></i> 页脚信息</h2>
                <div class="form-card">
                    <div class="form-group">
                        <label>页脚描述</label>
                        <textarea id="footerDesc" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>版权文字</label>
                        <input type="text" id="footerCopyright">
                    </div>
                    <div class="form-group">
                        <label>订阅提示文字</label>
                        <input type="text" id="footerNewsletter">
                    </div>
                </div>
            </section>
        </div>
    </main>
</div>

<script src="js/admin.js"></script>
</body>
</html>
